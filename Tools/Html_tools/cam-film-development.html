<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Development — CAM Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F2EE;
    --surface: #FFFFFF;
    --text: #121212;
    --text-2: #4A4A4A;
    --divider: #E2E0DA;
    --accent: #2F4A3F;
    --accent-dim: #3d5e51;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    overflow: hidden; /* no scroll on desktop */
  }

  /* ── OUTER SHELL ── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 12px;
    gap: 10px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: 4px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-2);
  }

  .step-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .step-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 2px;
    border: 1px solid var(--divider);
    background: var(--bg);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .step-btn:hover { border-color: #999; color: var(--text); }
  .step-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── BODY: illustration + params ── */
  .body {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 10px;
    flex: 1;
    min-height: 0;
  }

  /* ── LEFT: ILLUSTRATION ── */
  .illustration {
    background: #111;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .illustration svg {
    width: 100%;
    height: 100%;
  }

  /* Step title overlay at bottom of illustration */
  .illus-footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.7);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .illus-step-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .illus-step-num {
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  /* ── RIGHT: PARAMS PANEL ── */
  .params {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .params-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
  }

  .params-header-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-2);
    margin-bottom: 4px;
  }

  .params-step-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  /* Progress bar */
  .progress-wrap {
    padding: 8px 16px;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
  }

  .progress-bar {
    height: 3px;
    background: var(--divider);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Param rows — scrollable if needed */
  .params-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  /* Each parameter item */
  .param-item {
    border-bottom: 1px solid var(--divider);
  }

  .param-item:last-child { border-bottom: none; }

  .param-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
    gap: 8px;
  }

  .param-row:hover { background: var(--bg); }

  .param-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }

  .param-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-2);
  }

  .param-value {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .param-toggle {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--divider);
    flex-shrink: 0;
    transition: transform 0.2s, color 0.2s;
  }

  .param-item.open .param-toggle {
    transform: rotate(90deg);
    color: var(--accent);
  }

  .param-expand {
    display: none;
    padding: 0 16px 12px;
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-2);
    background: var(--bg);
    border-top: 1px solid var(--divider);
  }

  .param-item.open .param-expand { display: block; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 8px;
  }

  .btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    height: 34px;
    padding: 0 18px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid var(--divider);
    background: transparent;
    color: var(--text);
    transition: all 0.15s;
  }

  .btn:hover:not(:disabled) { border-color: #999; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) { background: var(--accent-dim); }

  .step-counter {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-2);
  }

  /* ── PHONE: sticky illustration, params scroll beneath ── */
  @media (max-width: 640px) {
    html, body {
      overflow: auto;
      height: auto;
    }

    .shell {
      height: auto;
      overflow: visible;
      padding: 8px;
      gap: 0;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 8px 12px;
    }

    /* Hide step nav labels on phone — too cramped */
    .step-nav .step-btn {
      font-size: 9px;
      padding: 4px 7px;
    }

    .body {
      grid-template-columns: 1fr;
      gap: 0;
    }

    /* Illustration sticky below header */
    .illustration {
      position: sticky;
      top: 52px; /* height of header */
      z-index: 10;
      height: 48vw; /* proportional to screen width */
      min-height: 200px;
      max-height: 280px;
      border-radius: 0;
      border-bottom: 2px solid #2F4A3F;
    }

    /* Params panel scrolls underneath illustration */
    .params {
      border-radius: 0;
      border-top: none;
      /* Add top padding so first param isn't hidden under sticky illustration */
    }

    .params-header {
      padding: 10px 12px 8px;
    }

    .params-step-title {
      font-size: 14px;
    }

    .param-row {
      padding: 10px 12px;
    }

    .param-expand {
      padding: 0 12px 10px;
      font-size: 13px;
    }

    /* Bottom nav sticky at bottom of viewport */
    .bottom-nav {
      position: sticky;
      bottom: 0;
      z-index: 20;
      background: var(--bg);
      border-top: 1px solid var(--divider);
      padding: 8px 12px;
      margin-top: 0;
    }
  }

  /* ── TABLET portrait ── */
  @media (max-width: 900px) and (min-width: 641px) {
    .body { grid-template-columns: 1fr 260px; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>Film Development Process</h1>
      <p>ART 181 — B&W Film Photography</p>
    </div>
    <div class="step-nav" id="stepNav"></div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- LEFT: Illustration -->
    <div class="illustration" id="illustrationPanel">
      <svg id="illustrationSVG" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="illus-footer">
        <span class="illus-step-name" id="illusStepName">Select a step</span>
        <span class="illus-step-num" id="illusStepNum"></span>
      </div>
    </div>

    <!-- RIGHT: Params -->
    <div class="params">
      <div class="params-header">
        <div class="params-header-label">Step Details</div>
        <div class="params-step-title" id="paramStepTitle">Choose a step above</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="params-body" id="paramsBody"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
    <span class="step-counter" id="stepCounter">Step 0 of 7</span>
    <button class="btn btn-primary" id="nextBtn" onclick="startOrNext()">Start →</button>
  </div>

</div>

<script>
// ─── STEP DATA ───────────────────────────────────────────────────────────────
const steps = [
  {
    id: 'load',
    label: 'Load',
    title: 'Load Film onto Reel',
    params: [
      { label: 'Chemical', value: 'None', explain: 'This step has no chemistry. It is purely mechanical — film from cartridge to reel to tank. The chemistry comes next.' },
      { label: 'Light', value: 'Complete darkness', explain: 'Film is light-sensitive until it is sealed inside the tank. The changing bag creates a portable pocket of darkness so you can do this anywhere — classroom, kitchen, parking lot. It does not matter. Inside the bag it is always dark.' },
      { label: 'How', value: 'By touch — eyes useless', explain: 'Your hands learn this. Rock the two halves of the Paterson reel back and forth — the ball bearings grab the film edges and walk it onto the spiral. Keep the film taut but not forced. When resistance stops, the roll is on.' },
      { label: 'Sequence', value: '① reel  ② tank  ③ lid', explain: 'Film onto reel. Reel into tank. Lid on. In that order. Once the lid is on the tank is light-safe and you can pull your arms out of the bag and turn the lights on.' },
      { label: 'Common mistake', value: 'Kinked leader', explain: 'If the film kinks at the entry point it will not feed. Pull the leader out a few inches, trim it straight across with scissors if possible before you go into the bag, and make sure it feeds in edge-first, not corner-first.' },
    ],
    drawFn: drawLoad,
  },
  {
    id: 'developer',
    label: 'Developer',
    title: 'Developer — D-76 1:1',
    params: [
      { label: 'Chemical', value: 'Kodak D-76 diluted 1:1', explain: 'D-76 is a fine-grain film developer. We dilute it 1 part developer to 1 part water. This slows development slightly, gives you more control, and produces excellent tonal range with Tri-X.' },
      { label: 'Time', value: '10 minutes exactly', explain: 'Ten minutes at 20°C is the course standard for Tri-X in D-76 1:1. Do not guess. Use a timer. Thirty seconds short or long at this temperature makes a measurable difference in the negative.' },
      { label: 'Temperature', value: '20°C / 68°F', explain: 'Temperature and time are linked. Warmer developer develops faster. We hold 20°C because it is the reference standard — all published times are based on it. Check your chemistry temperature before you pour.' },
      { label: 'Agitation', value: '30 sec continuous, then 5 sec / 30 sec', explain: 'Continuous agitation for the first 30 seconds ensures even coverage. After that, 5 seconds of inversion every 30 seconds keeps fresh developer moving without creating edge effects from over-agitation.' },
      { label: 'Light', value: 'Tank sealed — light safe', explain: 'Once the lid is on the Paterson tank you can handle it in room light. The pour spout lets you add and drain chemistry without ever opening the tank.' },
    ],
    drawFn: drawDeveloper,
  },
  {
    id: 'stopbath',
    label: 'Stop Bath',
    title: 'Stop Bath — Ilfostop',
    params: [
      { label: 'Chemical', value: 'Ilfostop (diluted)', explain: 'Ilfostop is a weak acid — acetic acid in water. It neutralizes the alkaline developer instantly on contact. The moment stop bath enters the tank, development stops.' },
      { label: 'Time', value: '30 seconds', explain: 'Thirty seconds is enough to fully neutralize the developer. More time does not hurt, but is not necessary. Drain completely before adding fixer.' },
      { label: 'Agitation', value: 'Continuous', explain: 'Agitate continuously for the full 30 seconds. You want fresh stop bath in contact with every inch of film surface to ensure even, immediate halt of development.' },
      { label: 'Indicator', value: 'Turns purple when exhausted', explain: 'Indicator stop bath starts yellow-orange. When it turns purple, it is done — pour it back in the bottle and mix fresh. Until it changes color it is working fine. One batch lasts many sessions.' },
      { label: 'Why it matters', value: 'Locks in exact development time', explain: 'Without stop bath, residual developer on the film keeps working as it drains into the fixer. Stop bath gives you precision — the negative is exactly as developed as you intended, not a few seconds more.' },
    ],
    drawFn: drawStopBath,
  },
  {
    id: 'fixer',
    label: 'Fixer',
    title: 'Fixer — Rapid Fixer',
    params: [
      { label: 'Chemical', value: 'Kodak Rapid Fixer', explain: 'Fixer dissolves the unexposed silver halide crystals remaining in the emulsion. Before fixing, the film is still light-sensitive. After fixing, it is permanently stable and can be handled in room light.' },
      { label: 'Time', value: '5 minutes', explain: 'Rapid Fixer works in 5 minutes for film. You can test by holding the film leader to light after 2 minutes — when the milky cloudiness clears, fixing is complete. Always go the full 5 minutes for consistency.' },
      { label: 'Agitation', value: '30 sec continuous, then 5 sec / 30 sec', explain: 'Same pattern as developer. Keeps fresh fixer in contact with the film. Under-agitated fixer leaves uneven fixing — parts of the negative will still be light sensitive.' },
      { label: 'Light', value: 'Still sealed — wait for full fix time', explain: 'Do not open the tank before the full fix time even though fixer is working. Partially fixed film exposed to light will fog. Wait the full 5 minutes.' },
      { label: 'Capacity', value: 'Check — fixer exhausts', explain: 'Fixer gets weaker with use. Exhausted fixer produces prints and negatives that will fade over time. We keep track of how many rolls each batch has fixed. When in doubt, mix fresh.' },
    ],
    drawFn: drawFixer,
  },
  {
    id: 'wash',
    label: 'Wash',
    title: 'Wash — Running Water',
    params: [
      { label: 'Chemical', value: 'Running water', explain: 'Running water flushes residual fixer from the film. Fixer is acidic — any left in the emulsion will slowly bleach the silver image over years. A proper wash is what makes a negative archival.' },
      { label: 'Time', value: '20–30 minutes', explain: '20 to 30 minutes of running water at the right temperature. Perma-Wash can shorten this dramatically — a few minutes in Perma-Wash followed by 10 minutes of water wash is equivalent to the full 30-minute wash.' },
      { label: 'Temperature', value: '18–24°C', explain: 'Cold water causes the gelatin to contract and actually traps fixer inside. Water that is too hot can soften the emulsion and cause reticulation — a crinkled texture that cannot be fixed. Stay in the 18–24°C range.' },
      { label: 'Light', value: 'Lid off — fully light safe', explain: 'The film is now fully fixed and light safe. Remove the lid, run water through the tank continuously. You can also pull the reel out and hang the film to check progress.' },
      { label: 'After wash', value: 'Photo-Flo then hang dry', explain: 'After the wash add a few drops of Photo-Flo to a tank of clean water and let the film sit for 30 seconds. Photo-Flo is a wetting agent that prevents water spots. Then hang the film to dry in a dust-free spot for 1–2 hours.' },
    ],
    drawFn: drawWash,
  },
  {
    id: 'photoflo',
    label: 'Photo-Flo',
    title: 'Photo-Flo — Wetting Agent',
    params: [
      { label: 'Chemical', value: 'Kodak Photo-Flo 200', explain: 'Photo-Flo is a surfactant — essentially a precisely engineered dish soap. A few drops in clean water is enough for an entire reel of film.' },
      { label: 'Time', value: '30 seconds', explain: 'A brief soak is all it takes. Swirl the reel gently — do not agitate hard or you will create bubbles that dry onto the film surface.' },
      { label: 'Why it works', value: 'Breaks water surface tension', explain: 'Water naturally beads on surfaces. If water beads on your film and dries, it leaves mineral deposits — white spots visible on your negative and any print you make from it. Photo-Flo makes the water sheet off in a smooth, even film instead of beading.' },
      { label: 'Amount', value: 'A few drops only', explain: 'More is not better. Too much Photo-Flo leaves its own residue. The standard is about 1–2ml per liter of water, or roughly 5 drops in a Paterson tank of water.' },
      { label: 'After', value: 'Squeegee — hang — do not touch', explain: 'Pull the film slowly off the reel. One gentle pass with a clean squeegee or two soft fingers. Then hang immediately with a clip at top and a weighted clip at bottom to prevent curling. Do not touch the emulsion side.' },
    ],
    drawFn: drawPhotoFlo,
  },
  {
    id: 'dry',
    label: 'Dry',
    title: 'Hang to Dry',
    params: [
      { label: 'Time', value: '1–2 hours', explain: 'Room temperature drying takes 1 to 2 hours depending on humidity. Do not rush it with heat — uneven drying causes tide line marks in the emulsion that cannot be removed.' },
      { label: 'Environment', value: 'Dust-free — no air movement', explain: 'Dust that lands on wet emulsion sticks permanently and shows on every print you make. Dry in a closed space — a closet, a bathroom with the fan off. Avoid drying near HVAC vents.' },
      { label: 'Handling', value: 'Do not touch emulsion', explain: 'The gelatin emulsion is soft until fully dry. A fingerprint on wet emulsion is permanent. Handle by the edges only, or use clean gloves.' },
      { label: 'When dry', value: 'Cut into strips of 5–6 frames', explain: 'Once fully dry, cut the film into strips. Standard archival sleeves hold 6 frames per strip for 35mm. Cut between frames, not through them.' },
      { label: 'Filing', value: 'Archival sleeves — label immediately', explain: 'Write your name, date, and roll number on the sleeve before you put the film in. Negatives without labels become mysteries within a semester. This is your archive. Treat it that way.' },
    ],
    drawFn: drawDry,
  },
];

// ─── ILLUSTRATION FUNCTIONS ───────────────────────────────────────────────────

function drawLoad(svg) {
  svg.setAttribute('viewBox', '0 0 400 300');
  svg.innerHTML = `
    <!-- Dark background -->
    <rect width="400" height="300" fill="#111"/>

    <!-- Changing bag body -->
    <rect x="40" y="30" width="320" height="180" rx="20" fill="#1c1c1c" stroke="#2F4A3F" stroke-width="3"/>

    <!-- Zipper -->
    <rect x="50" y="30" width="300" height="12" rx="5" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
    <line x1="55" y1="36" x2="345" y2="36" stroke="#666" stroke-width="2" stroke-dasharray="8,5"/>
    <rect x="192" y="25" width="18" height="16" rx="4" fill="#888" stroke="#bbb" stroke-width="1.5"/>
    <circle cx="201" cy="33" r="5" fill="#aaa"/>

    <!-- Inside text -->
    <text x="200" y="100" font-family="IBM Plex Sans" font-size="14" fill="#555" text-anchor="middle">inside the bag:</text>
    <text x="200" y="124" font-family="IBM Plex Sans" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">film cartridge → reel → tank</text>
    <text x="200" y="148" font-family="IBM Plex Mono" font-size="13" fill="#2F4A3F" text-anchor="middle">COMPLETE DARKNESS</text>
    <text x="200" y="168" font-family="IBM Plex Mono" font-size="11" fill="#3a3a3a" text-anchor="middle">hands work by touch alone</text>

    <!-- Left sleeve -->
    <ellipse cx="110" cy="210" rx="56" ry="22" fill="#0d0d0d" stroke="#2F4A3F" stroke-width="2.5"/>
    <ellipse cx="110" cy="210" rx="44" ry="15" fill="#080808"/>
    <text x="110" y="214" font-family="IBM Plex Mono" font-size="12" font-weight="600" fill="#2F4A3F" text-anchor="middle">LEFT ARM</text>

    <!-- Right sleeve -->
    <ellipse cx="290" cy="210" rx="56" ry="22" fill="#0d0d0d" stroke="#2F4A3F" stroke-width="2.5"/>
    <ellipse cx="290" cy="210" rx="44" ry="15" fill="#080808"/>
    <text x="290" y="214" font-family="IBM Plex Mono" font-size="12" font-weight="600" fill="#2F4A3F" text-anchor="middle">RIGHT ARM</text>

    <!-- Sequence steps at bottom -->
    <rect x="30" y="248" width="100" height="42" rx="5" fill="#1e1e1e" stroke="#2F4A3F" stroke-width="1.5"/>
    <text x="80" y="266" font-family="IBM Plex Mono" font-size="16" fill="#2F4A3F" text-anchor="middle">①</text>
    <text x="80" y="282" font-family="IBM Plex Sans" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">film onto reel</text>

    <text x="150" y="272" font-family="IBM Plex Mono" font-size="18" fill="#333" text-anchor="middle">→</text>

    <rect x="160" y="248" width="80" height="42" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>
    <text x="200" y="266" font-family="IBM Plex Mono" font-size="16" fill="#888" text-anchor="middle">②</text>
    <text x="200" y="282" font-family="IBM Plex Sans" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">reel in tank</text>

    <text x="248" y="272" font-family="IBM Plex Mono" font-size="18" fill="#333" text-anchor="middle">→</text>

    <rect x="258" y="248" width="112" height="42" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>
    <text x="314" y="266" font-family="IBM Plex Mono" font-size="16" fill="#888" text-anchor="middle">③</text>
    <text x="314" y="282" font-family="IBM Plex Sans" font-size="11" font-weight="600" fill="#2F4A3F" text-anchor="middle">lid on → light safe</text>
  `;
}

function drawTankWithLevel(svg, levelPct, chemColor, chemOpacity, label, showBubbles) {
  const levelY = 60 + (160 * (1 - levelPct));
  const levelH = 160 * levelPct;
  const bubbles = showBubbles ? `
    <circle cx="130" cy="${levelY + levelH * 0.3}" r="4" fill="rgba(255,255,255,0.2)"><animate attributeName="cy" values="${levelY + levelH * 0.3};${levelY + 10}" dur="1.8s" repeatCount="indefinite"/></circle>

// ─── UI LOGIC ─────────────────────────────────────────────────────────────────

let current = -1;

function buildNav() {
  const nav = document.getElementById('stepNav');
  steps.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'step-btn';
    btn.textContent = s.label;
    btn.onclick = () => goTo(i);
    btn.id = 'stepBtn' + i;
    nav.appendChild(btn);
  });
}

function buildParams(step) {
  const body = document.getElementById('paramsBody');
  body.innerHTML = '';
  step.params.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'param-item';
    item.innerHTML = `
      <div class="param-row" onclick="toggleParam(this)">
        <div class="param-left">
          <span class="param-label">${p.label}</span>
          <span class="param-value">${p.value}</span>
        </div>
        <span class="param-toggle">›</span>
      </div>
      <div class="param-expand">${p.explain}</div>
    `;
    body.appendChild(item);
  });
}

function toggleParam(row) {
  const item = row.parentElement;
  item.classList.toggle('open');
}

function goTo(i) {
  current = i;
  const s = steps[i];

  document.querySelectorAll('.step-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === steps.length - 1;
  document.getElementById('nextBtn').textContent = i === steps.length - 1 ? 'Done' : 'Next →';
  document.getElementById('stepCounter').textContent = `Step ${i + 1} of ${steps.length}`;

  const pct = Math.round(((i + 1) / steps.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('illusStepName').textContent = s.title;
  document.getElementById('illusStepNum').textContent = `${i + 1} / ${steps.length}`;
  document.getElementById('paramStepTitle').textContent = s.title;

  const svg = document.getElementById('illustrationSVG');
  s.drawFn(svg);

  buildParams(s);
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < steps.length) goTo(next);
}

function startOrNext() {
  if (current === -1) goTo(0);
  else navigate(1);
}

buildNav();
goTo(0);
</script>
