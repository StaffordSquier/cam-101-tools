<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM-04a — Aperture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F2EE;--surface:#FFFFFF;--text:#121212;--text-2:#4A4A4A;--div:#E2E0DA;--accent:#2F4A3F;--accent-dim:#3d5e51;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
header{height:52px;background:var(--surface);border-bottom:1px solid var(--div);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
header h1{font-size:18px;font-weight:600;letter-spacing:-.3px;margin:0;}
.sub{font-family:var(--mono);font-size:12px;color:var(--text-2);flex:1;}
.hdr-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--accent);}
.body{display:flex;flex-direction:column;height:calc(100% - 52px);}
.viz{flex:1;min-height:0;position:relative;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}
.strip{background:var(--surface);border-top:1px solid var(--div);padding:14px 24px 16px;flex-shrink:0;}
.sl-row{display:flex;align-items:center;gap:16px;margin-bottom:10px;}
.sl-lbl{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2);white-space:nowrap;}
.sl-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--accent);white-space:nowrap;min-width:72px;}
.sl-wrap{flex:1;max-width:520px;}
.sl-ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text-2);margin-top:4px;}
input[type=range]{width:100%;-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;background:linear-gradient(90deg,var(--accent) var(--p,50%),var(--div) var(--p,50%));}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--surface);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .1s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);}
.sl-desc{font-size:13px;color:var(--text-2);line-height:1.4;flex:1;}
.pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:2px;background:transparent;border:1px solid var(--div);color:var(--text-2);opacity:.45;transition:all .15s;}
.pill.on{opacity:1;background:rgba(47,74,63,.08);border-color:var(--accent);color:var(--accent);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--div);border-radius:3px;}
</style>
</head>
<body>
<header>
  <h1>Aperture</h1>
  <span class="sub">CAM-04a &nbsp;·&nbsp; Week 1</span>
  <span class="hdr-val" id="hdrVal">f/5.6</span>
</header>
<div class="body">
  <div class="viz"><canvas id="cv"></canvas></div>
  <div class="strip">
    <div class="sl-row">
      <span class="sl-lbl">f-stop</span>
      <span class="sl-val" id="sVal">f/5.6</span>
      <div class="sl-wrap">
        <input type="range" id="sl" min="0" max="8" step="1" value="4">
        <div class="sl-ends"><span>f/1.4 — wide open</span><span>f/22 — stopped down</span></div>
      </div>
      <span class="sl-desc" id="sDesc">Moderate depth of field.</span>
    </div>
    <div class="pills">
      <span class="pill" id="pBrt">More Light</span>
      <span class="pill" id="pDrk">Less Light</span>
      <span class="pill" id="pSh">Shallow Depth of Field</span>
      <span class="pill" id="pDp">Deep Depth of Field</span>
      <span class="pill" id="pPo">Portrait Setting</span>
      <span class="pill" id="pLa">Landscape / Architecture</span>
    </div>
  </div>
</div>
<script>
'use strict';
var AP=['f/1.4','f/2','f/2.8','f/4','f/5.6','f/8','f/11','f/16','f/22'];
var DESC=[
  'Wide open. Maximum light gathering. Extremely shallow depth of field — only the focused subject is sharp. Everything else melts away.',
  'Very wide. Shallow depth of field. Backgrounds blur into smooth wash. Classic portrait aperture.',
  'Wide. Subject sharp, background soft. Good subject separation without extreme bokeh.',
  'Moderately wide. Sharpness extends a bit in front of and behind the subject.',
  'Middle aperture. Moderate depth of field. Balanced between light and sharpness range.',
  'Narrowing. More of the scene becomes sharp. Good all-around outdoor setting.',
  'Narrow. Deep depth of field. Most of the scene is sharp from near to far.',
  'Very narrow. Maximizing sharpness throughout the scene. Architecture and landscapes.',
  'Fully stopped down. Maximum depth of field. Everything from foreground to horizon sharp.'
];
var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),sl=document.getElementById('sl'),idx=4;

function calcBlur(d,t){if(d===0)return 0;return Math.min(Math.abs(d)*(1-t)*(d>0?9:7),20);}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function drawIris(cx,cy,R,fi){
  var numB=7,openR=R*.88-(fi/8)*R*.82,ov=.28;
  var bg=ctx.createRadialGradient(cx-R*.3,cy-R*.3,3,cx,cy,R);
  bg.addColorStop(0,'#2e3d52');bg.addColorStop(.5,'#1a2535');bg.addColorStop(1,'#0c1018');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R-1,0,Math.PI*2);ctx.clip();
  for(var i=0;i<numB;i++){
    var a0=(i/numB)*Math.PI*2,a1=((i+1)/numB)*Math.PI*2,am=(a0+a1)/2,ir=openR+2;
    ctx.beginPath();
    ctx.moveTo(cx+ir*Math.cos(a0-ov),cy+ir*Math.sin(a0-ov));
    ctx.lineTo(cx+R*Math.cos(a0-ov*.3),cy+R*Math.sin(a0-ov*.3));
    ctx.lineTo(cx+R*Math.cos(a1+ov*.3),cy+R*Math.sin(a1+ov*.3));
    ctx.lineTo(cx+ir*Math.cos(a1+ov),cy+ir*Math.sin(a1+ov));
    ctx.quadraticCurveTo(cx+(ir-5)*Math.cos(am),cy+(ir-5)*Math.sin(am),cx+ir*Math.cos(a0-ov),cy+ir*Math.sin(a0-ov));
    ctx.closePath();
    var g2=ctx.createLinearGradient(cx+R*Math.cos(am),cy+R*Math.sin(am),cx,cy);
    g2.addColorStop(0,i%2===0?'#3a4a5e':'#48586e');g2.addColorStop(1,i%2===0?'#1e2a3a':'#283240');
    ctx.fillStyle=g2;ctx.fill();
    ctx.strokeStyle='rgba(140,180,220,.35)';ctx.lineWidth=.7;ctx.stroke();
  }
  ctx.restore();
  var g=1-(fi/8);
  var og=ctx.createRadialGradient(cx-openR*.28,cy-openR*.28,0,cx,cy,openR);
  og.addColorStop(0,'rgba('+(190+Math.round(g*55))+','+(210+Math.round(g*35))+','+(230+Math.round(g*15))+','+(0.45+g*.45)+')');
  og.addColorStop(.55,'rgba('+(90+Math.round(g*70))+','+(120+Math.round(g*70))+','+(170+Math.round(g*50))+','+(0.55+g*.3)+')');
  og.addColorStop(1,'rgba(6,10,18,1)');
  ctx.beginPath();ctx.arc(cx,cy,openR,0,Math.PI*2);ctx.fillStyle=og;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(120,160,200,.2)';ctx.lineWidth=2.5;ctx.stroke();
}

function drawDOF(sx,sy,pw,ph,t){
  var midY=sy+ph*.50,camRX=sx+50,pad=20,dL=camRX+pad,dR=sx+pw-pad;
  function dToX(d){return dL+(2-d)/4*(dR-dL);}
  var THRESH=.8,fgD=t>=1?99:THRESH/(9*(1-t)),bgD=t>=1?99:THRESH/(7*(1-t));
  var zL=Math.max(camRX+2,dToX(Math.min(fgD,2.5))),zR=Math.min(sx+pw-4,dToX(-Math.min(bgD,2.5)));
  var objs=[{d:2,lbl:'Near'},{d:1,lbl:''},{d:0,lbl:'Subject'},{d:-1,lbl:''},{d:-2,lbl:'Far'}];
  // Panel bg
  ctx.fillStyle='#faf8f4';ctx.fillRect(sx,sy,pw,ph);
  // Divider
  ctx.strokeStyle='#E2E0DA';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx,sy+ph);ctx.stroke();
  // Labels
  ctx.font='600 10px IBM Plex Mono,monospace';ctx.fillStyle='#aaa89e';ctx.textAlign='left';
  ctx.fillText('DEPTH OF FIELD — TOP VIEW',sx+16,sy+17);
  ctx.font='600 14px IBM Plex Mono,monospace';ctx.fillStyle='rgba(47,74,63,.8)';ctx.textAlign='right';
  ctx.fillText(AP[idx],sx+pw-16,sy+17);
  // FOV cone
  var fov=ph*.27;
  ctx.save();ctx.beginPath();ctx.moveTo(camRX,midY);ctx.lineTo(sx+pw,midY-fov);ctx.lineTo(sx+pw,midY+fov);ctx.closePath();
  ctx.fillStyle='rgba(218,216,210,.4)';ctx.fill();
  ctx.strokeStyle='#d0ccc4';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(camRX,midY);ctx.lineTo(sx+pw,midY-fov);
  ctx.moveTo(camRX,midY);ctx.lineTo(sx+pw,midY+fov);
  ctx.stroke();ctx.setLineDash([]);ctx.restore();
  // Centerline
  ctx.strokeStyle='#dcd8d0';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(camRX,midY);ctx.lineTo(sx+pw-4,midY);ctx.stroke();
  // Sharp zone
  ctx.save();ctx.beginPath();ctx.rect(camRX,sy+24,pw-50,ph-32);ctx.clip();
  ctx.fillStyle='rgba(47,74,63,.09)';ctx.fillRect(zL,sy+24,zR-zL,ph-32);
  ctx.strokeStyle='rgba(47,74,63,.4)';ctx.lineWidth=1.5;ctx.setLineDash([4,5]);
  ctx.beginPath();
  if(zL>camRX+3){ctx.moveTo(zL,sy+26);ctx.lineTo(zL,sy+ph-10);}
  ctx.moveTo(zR,sy+26);ctx.lineTo(zR,sy+ph-10);
  ctx.stroke();ctx.setLineDash([]);
  if(zR-zL>40){ctx.font='10px IBM Plex Mono,monospace';ctx.textAlign='center';ctx.fillStyle='rgba(47,74,63,.5)';ctx.fillText('in focus',(zL+zR)/2,sy+ph-11);}
  ctx.restore();
  // Objects
  objs.forEach(function(o){
    var x=dToX(o.d),isSub=o.d===0,blur=calcBlur(o.d,t),inZ=blur<THRESH;
    if(!inZ){var rings=Math.ceil(blur/4);for(var ri=rings;ri>=1;ri--){ctx.beginPath();ctx.arc(x,midY,8+ri*5,0,Math.PI*2);ctx.strokeStyle='rgba(180,172,160,'+(0.07+(rings-ri)*.04)+')';ctx.lineWidth=1.5;ctx.stroke();}}
    ctx.beginPath();ctx.arc(x,midY,isSub?9:6.5,0,Math.PI*2);ctx.fillStyle=isSub?'#2F4A3F':(inZ?'#5a8870':'#bab6ae');ctx.fill();
    if(isSub){ctx.strokeStyle='rgba(47,74,63,.4)';ctx.lineWidth=1.5;ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(x,sy+26);ctx.lineTo(x,midY-13);ctx.moveTo(x,midY+13);ctx.lineTo(x,sy+ph-18);ctx.stroke();ctx.setLineDash([]);}
    if(o.lbl){ctx.font=(isSub?'600':'400')+' 11px IBM Plex Mono,monospace';ctx.textAlign='center';ctx.fillStyle=isSub?'#2F4A3F':(inZ?'#5a8870':'#aaa098');ctx.fillText(o.lbl,x,midY+(isSub?9:6.5)+15);}
  });
  // Camera body
  var bW=34,bH=22,bX=camRX-bW,bY=midY-bH/2;
  ctx.fillStyle='#2F4A3F';rr(bX,bY,bW,bH,3);ctx.fill();
  ctx.fillStyle='#3d5e51';rr(bX+7,bY-5,13,6,2);ctx.fill();
  ctx.fillStyle='#1a2a24';ctx.beginPath();ctx.arc(camRX,midY,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#08100a';ctx.beginPath();ctx.arc(camRX,midY,4,0,Math.PI*2);ctx.fill();
  ctx.font='9px IBM Plex Mono,monospace';ctx.textAlign='center';ctx.fillStyle='rgba(47,74,63,.55)';ctx.fillText('Camera',bX+bW/2,midY+bH/2+12);
}

function draw(){
  var W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  var split=Math.round(W*.42),t=idx/8;
  // Left dark panel
  ctx.fillStyle='#0d1620';ctx.fillRect(0,0,split,H);
  // Iris
  var irisR=Math.min(split*.37,H*.35),icx=split/2,icy=H*.47;
  drawIris(icx,icy,irisR,idx);
  // f-stop value below iris
  var fs=Math.max(26,Math.round(irisR*.38));
  ctx.font='500 '+fs+'px IBM Plex Mono,monospace';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.88)';
  ctx.fillText(AP[idx],icx,icy+irisR+Math.max(26,fs*.8));
  // Section label above iris
  ctx.font='600 10px IBM Plex Mono,monospace';ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.fillText('APERTURE',icx,icy-irisR-14);
  // Light amount indicator - small row of dots
  var dotY=icy+irisR+Math.max(26,fs*.8)+22,dotSpacing=12,numDots=5;
  var litDots=Math.round((1-idx/8)*numDots);
  for(var d=0;d<numDots;d++){
    var dx=icx+(d-numDots/2+.5)*dotSpacing;
    ctx.beginPath();ctx.arc(dx,dotY,3.5,0,Math.PI*2);
    ctx.fillStyle=d<litDots?'rgba(255,255,255,.55)':'rgba(255,255,255,.10)';ctx.fill();
  }
  ctx.font='10px IBM Plex Mono,monospace';ctx.fillStyle='rgba(255,255,255,.22)';ctx.textAlign='left';
  ctx.fillText('LIGHT',icx-numDots/2*dotSpacing-6,dotY+3);
  // Right DOF panel
  drawDOF(split,0,W-split,H,t);
}

function pill(id,on){var e=document.getElementById(id);if(on)e.classList.add('on');else e.classList.remove('on');}
function update(){
  idx=+sl.value;sl.style.setProperty('--p',(idx/8*100)+'%');
  var v=AP[idx];
  document.getElementById('hdrVal').textContent=v;
  document.getElementById('sVal').textContent=v;
  document.getElementById('sDesc').textContent=DESC[idx];
  pill('pBrt',idx<=2);pill('pDrk',idx>=6);
  pill('pSh',idx<=3);pill('pDp',idx>=5);
  pill('pPo',idx<=3);pill('pLa',idx>=6);
  draw();
}
function resize(){var p=cv.parentElement;cv.width=p.offsetWidth;cv.height=p.offsetHeight;draw();}
sl.addEventListener('input',update);
if(typeof ResizeObserver!=='undefined'){new ResizeObserver(resize).observe(cv.parentElement);}
else{window.addEventListener('resize',resize);}
resize();update();
</script>
</body>
</html>
