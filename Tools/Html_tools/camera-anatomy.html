<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM-101 — Camera Anatomy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           #F4F2EE;
  --surface:      #FFFFFF;
  --surface-dark: #444441;
  --text:         #121212;
  --text-2:       #4A4A4A;
  --divider:      #E2E0DA;
  --accent:       #2F4A3F;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--divider);
  padding: 14px 24px;
  position: sticky; top: 0; z-index: 10;
}
header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
header .sub { font-family: var(--mono); font-size: 11px; color: var(--text-2); margin-top: 3px; }
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}
.diagram-wrap {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 4px;
  padding: 24px;
  overflow-x: auto;
}
</style>
</head>
<body>

<header>
  <h1>Camera Anatomy</h1>
  <div class="sub">CAM-101 &nbsp;·&nbsp; Week 1 reference &nbsp;·&nbsp; 35mm SLR</div>
</header>

<main>
  <div class="diagram-wrap">
    <svg width="100%" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- ══ CAMERA BODY ══ -->
    <!-- Main body block -->
    <rect x="230" y="195" width="350" height="215" rx="8"
          fill="#444441" stroke="#5A5A57" stroke-width="1.5"/>

    <!-- Top plate -->
    <rect x="230" y="180" width="310" height="22" rx="4"
          fill="#3A3A37" stroke="#5A5A57" stroke-width="1"/>

    <!-- Right grip — thicker, pronounced -->
    <rect x="508" y="173" width="72" height="237" rx="12"
          fill="#3A3A37" stroke="#5A5A57" stroke-width="1.5"/>
    <!-- Grip texture -->
    <line x1="516" y1="200" x2="516" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="522" y1="200" x2="522" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="528" y1="200" x2="528" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="534" y1="200" x2="534" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="540" y1="200" x2="540" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="546" y1="200" x2="546" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="552" y1="200" x2="552" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="558" y1="200" x2="558" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="564" y1="200" x2="564" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>
    <line x1="570" y1="200" x2="570" y2="392" stroke="#2C2C2A" stroke-width="1.2"/>

    <!-- ══ PENTAPRISM HUMP ══ -->
    <path d="M298 180 L298 128 L332 98 L408 98 L442 128 L442 180 Z"
          fill="#3A3A37" stroke="#5A5A57" stroke-width="1.5"/>
    <!-- Prism highlight faces -->
    <path d="M298 180 L332 98 L370 106 L320 180 Z"
          fill="#FFFFFF" opacity="0.04"/>
    <path d="M442 180 L408 98 L370 106 L420 180 Z"
          fill="#FFFFFF" opacity="0.03"/>

    <!-- Viewfinder eyepiece -->
    <rect x="352" y="90" width="36" height="22" rx="5"
          fill="#2C2C2A" stroke="#5A5A57" stroke-width="1"/>
    <rect x="356" y="93" width="28" height="16" rx="3"
          fill="#1A1A18" opacity="0.9"/>

    <!-- ══ SHUTTER SPEED DIAL ══ -->
    <circle cx="474" cy="172" r="30"
            fill="#3A3A37" stroke="#5A5A57" stroke-width="1.5"/>
    <circle cx="474" cy="172" r="22"
            fill="#444441" stroke="#5A5A57" stroke-width="1"/>
    <!-- Knurling -->
    <circle cx="474" cy="172" r="29" fill="none"
            stroke="#2C2C2A" stroke-width="6" stroke-dasharray="3 3.2"/>
    <!-- Speed text -->
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#E2E0DA" x="474" y="165" text-anchor="middle" opacity="0.9">1/500</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="7"
          fill="#E2E0DA" x="474" y="177" text-anchor="middle" opacity="0.6">B 1 2 4 8</text>
    <!-- Indicator mark -->
    <rect x="473" y="143" width="2" height="8" rx="1" fill="#2F4A3F"/>

    <!-- ══ SHUTTER BUTTON ══ -->
    <ellipse cx="438" cy="181" rx="11" ry="8"
             fill="#5A5A57" stroke="#6A6A67" stroke-width="1"/>
    <ellipse cx="438" cy="178" rx="8" ry="5"
             fill="#6A6A67" opacity="0.5"/>

    <!-- ══ ISO / ASA DIAL ══ -->
    <circle cx="258" cy="172" r="24"
            fill="#3A3A37" stroke="#5A5A57" stroke-width="1.5"/>
    <circle cx="258" cy="172" r="17"
            fill="#444441" stroke="#5A5A57" stroke-width="1"/>
    <circle cx="258" cy="172" r="23" fill="none"
            stroke="#2C2C2A" stroke-width="5" stroke-dasharray="3 3"/>
    <text font-family="'IBM Plex Mono',monospace" font-size="8"
          fill="#E2E0DA" x="258" y="168" text-anchor="middle" opacity="0.9">ASA</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#2F4A3F" x="258" y="180" text-anchor="middle" font-weight="600">400</text>

    <!-- ══ FILM ADVANCE LEVER ══ -->
    <path d="M512 180 L512 156 L516 146 L570 130 L576 138 L524 158 L526 180 Z"
          fill="#E2E0DA" stroke="#B4B2A9" stroke-width="1"/>
    <path d="M512 156 L516 146 L570 130 L574 133 L518 150 Z"
          fill="#F4F2EE" opacity="0.8"/>

    <!-- ══ LARGE LENS ══ -->
    <!-- Mounting ring -->
    <circle cx="368" cy="304" r="100"
            fill="#5A5A57" stroke="#6A6A67" stroke-width="2"/>

    <!-- Focus ring (outermost) -->
    <circle cx="368" cy="304" r="90"
            fill="#3A3A37" stroke="#5A5A57" stroke-width="1.5"/>
    <circle cx="368" cy="304" r="90" fill="none"
            stroke="#2C2C2A" stroke-width="10" stroke-dasharray="4 3.5" opacity="0.5"/>
    <!-- Focus distance markings -->
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#E2E0DA" x="368" y="218" text-anchor="middle" opacity="0.8">∞</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="8"
          fill="#E2E0DA" x="449" y="248" text-anchor="middle" opacity="0.7">3m</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="8"
          fill="#E2E0DA" x="460" y="304" text-anchor="middle" opacity="0.7">2m</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="8"
          fill="#E2E0DA" x="449" y="364" text-anchor="middle" opacity="0.7">1m</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="8"
          fill="#E2E0DA" x="288" y="248" text-anchor="middle" opacity="0.7">3m</text>

    <!-- Aperture ring (second ring) -->
    <circle cx="368" cy="304" r="74"
            fill="#444441" stroke="#5A5A57" stroke-width="1.5"/>
    <circle cx="368" cy="304" r="74" fill="none"
            stroke="#2C2C2A" stroke-width="8" stroke-dasharray="3 4.5" opacity="0.4"/>
    <!-- f-stop markings -->
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#2F4A3F" x="368" y="235" text-anchor="middle" font-weight="600">f/16</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#E2E0DA" x="432" y="260" text-anchor="middle" opacity="0.8">f/8</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#E2E0DA" x="440" y="304" text-anchor="middle" opacity="0.8">f/4</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#E2E0DA" x="432" y="350" text-anchor="middle" opacity="0.8">f/2</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#E2E0DA" x="308" y="260" text-anchor="middle" opacity="0.8">f/11</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="9"
          fill="#E2E0DA" x="298" y="304" text-anchor="middle" opacity="0.8">f/5.6</text>

    <!-- Inner barrel -->
    <circle cx="368" cy="304" r="58"
            fill="#3A3A37" stroke="#5A5A57" stroke-width="1"/>

    <!-- Lens glass -->
    <circle cx="368" cy="304" r="50" fill="#2C2C2A" opacity="0.9"/>
    <circle cx="368" cy="304" r="42" fill="#1A1A18"/>
    <circle cx="368" cy="304" r="30" fill="#222220"/>
    <circle cx="368" cy="304" r="16" fill="#1A1A18"/>
    <!-- Lens reflection highlights -->
    <ellipse cx="354" cy="290" rx="10" ry="6"
             fill="#FFFFFF" opacity="0.06" transform="rotate(-35 354 290)"/>
    <ellipse cx="382" cy="316" rx="6" ry="4"
             fill="#FFFFFF" opacity="0.04" transform="rotate(-35 382 316)"/>

    <!-- Aperture indicator dot -->
    <circle cx="368" cy="230" r="3" fill="#2F4A3F"/>

    <!-- ══ IN-CAMERA METER ══ -->
    <rect x="460" y="336" width="68" height="42" rx="3"
          fill="#F4F2EE" stroke="#E2E0DA" stroke-width="1"/>
    <text font-family="'IBM Plex Mono',monospace" font-size="7"
          fill="#4A4A4A" x="494" y="349" text-anchor="middle">meter</text>
    <line x1="470" y1="368" x2="518" y2="368"
          stroke="#E2E0DA" stroke-width="1"/>
    <line x1="494" y1="352" x2="494" y2="368"
          stroke="#E2E0DA" stroke-width="0.5" stroke-dasharray="2 2"/>
    <!-- Needle slightly left of center = slightly underexposed -->
    <line x1="484" y1="355" x2="494" y2="368"
          stroke="#5C2F2F" stroke-width="2" stroke-linecap="round"/>
    <text font-family="'IBM Plex Mono',monospace" font-size="7"
          fill="#4A4A4A" x="473" y="377" text-anchor="middle">-</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="7"
          fill="#2F4A3F" x="494" y="377" text-anchor="middle" font-weight="600">0</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="7"
          fill="#4A4A4A" x="515" y="377" text-anchor="middle">+</text>

    <!-- ══ CALLOUT LABELS — Rookery style ══ -->
    <!-- Leader line style: 0.8px, #E2E0DA dashed, arrow in accent green -->

    <!-- 1. PENTAPRISM -->
    <line x1="370" y1="98" x2="370" y2="56"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="270" y="8" width="200" height="44" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="370" y="26" text-anchor="middle">Pentaprism hump</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="370" y="42" text-anchor="middle">Routes image from mirror to viewfinder</text>

    <!-- 2. SHUTTER DIAL -->
    <line x1="500" y1="148" x2="620" y2="100"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="622" y="64" width="220" height="56" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="732" y="82" text-anchor="middle">Shutter speed dial</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="732" y="98" text-anchor="middle">How long the shutter stays open</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#2F4A3F" x="732" y="112" text-anchor="middle">1/1000 freeze motion — 1s blur motion</text>

    <!-- 3. SHUTTER BUTTON -->
    <line x1="448" y1="178" x2="622" y2="160"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="622" y="132" width="220" height="44" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="732" y="150" text-anchor="middle">Shutter button</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="732" y="166" text-anchor="middle">Half-press to meter — full press to expose</text>

    <!-- 4. FILM ADVANCE LEVER -->
    <line x1="560" y1="148" x2="622" y2="210"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="622" y="188" width="220" height="44" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="732" y="206" text-anchor="middle">Film advance lever</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="732" y="222" text-anchor="middle">One stroke after every shot</text>

    <!-- 5. METER -->
    <line x1="528" y1="357" x2="622" y2="330"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="622" y="296" width="220" height="56" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="732" y="314" text-anchor="middle">In-camera light meter</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="732" y="330" text-anchor="middle">Visible in viewfinder — needle at 0</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#2F4A3F" x="732" y="344" text-anchor="middle">means correct exposure</text>

    <!-- 6. ISO DIAL -->
    <line x1="238" y1="154" x2="140" y2="100"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="4" y="64" width="132" height="56" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="70" y="82" text-anchor="middle">ISO / ASA dial</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="70" y="98" text-anchor="middle">Film sensitivity to light</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#2F4A3F" x="70" y="112" text-anchor="middle">Set once per roll loaded</text>

    <!-- 7. VIEWFINDER -->
    <line x1="370" y1="110" x2="140" y2="188"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="4" y="164" width="132" height="44" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="70" y="182" text-anchor="middle">Viewfinder</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="70" y="198" text-anchor="middle">Frame your shot here</text>

    <!-- 8. APERTURE RING -->
    <line x1="280" y1="254" x2="140" y2="270"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="4" y="246" width="132" height="56" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="70" y="264" text-anchor="middle">Aperture ring</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="70" y="280" text-anchor="middle">Rotates on the lens barrel</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#2F4A3F" x="70" y="294" text-anchor="middle">f/2 open — f/16 closed</text>

    <!-- 9. FOCUS RING -->
    <line x1="272" y1="364" x2="140" y2="370"
          stroke="#E2E0DA" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <rect x="4" y="346" width="132" height="56" rx="4"
          fill="#FFFFFF" stroke="#E2E0DA" stroke-width="0.5"/>
    <text font-family="'IBM Plex Sans',sans-serif" font-size="13" font-weight="600"
          fill="#121212" x="70" y="364" text-anchor="middle">Focus ring</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4A4A4A" x="70" y="380" text-anchor="middle">Outer ring on the lens</text>
    <text font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#2F4A3F" x="70" y="394" text-anchor="middle">Rotate until sharp in viewfinder</text>

    </svg>
  </div>
</main>

</body>
</html>
